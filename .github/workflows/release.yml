name: Build & Release

on:
  push:
    branches: [main]

# Only one release at a time
concurrency:
  group: release
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Resolve SPM dependencies
        run: |
          xcodebuild -project CmdRack.xcodeproj \
            -scheme CmdRack \
            -resolvePackageDependencies

      - name: Read version from project
        id: version
        run: |
          VERSION=$(xcodebuild -project CmdRack.xcodeproj \
            -scheme CmdRack \
            -showBuildSettings 2>/dev/null \
            | grep MARKETING_VERSION \
            | head -1 \
            | awk '{print $3}')
          BUILD=$(xcodebuild -project CmdRack.xcodeproj \
            -scheme CmdRack \
            -showBuildSettings 2>/dev/null \
            | grep CURRENT_PROJECT_VERSION \
            | head -1 \
            | awk '{print $3}')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "build=$BUILD" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
          echo "Detected version: $VERSION (build $BUILD)"

      - name: Check if tag already exists
        id: check_tag
        run: |
          if git rev-parse "refs/tags/${{ steps.version.outputs.tag }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "⚠️ Tag ${{ steps.version.outputs.tag }} already exists — skipping release."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Archive app
        if: steps.check_tag.outputs.exists == 'false'
        run: |
          xcodebuild -project CmdRack.xcodeproj \
            -scheme CmdRack \
            -configuration Release \
            -archivePath build/CmdRack.xcarchive \
            archive \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Export app from archive
        if: steps.check_tag.outputs.exists == 'false'
        run: |
          mkdir -p build/export
          cp -R "build/CmdRack.xcarchive/Products/Applications/CmdRack.app" build/export/

      - name: Create zip
        if: steps.check_tag.outputs.exists == 'false'
        run: |
          cd build/export
          ditto -c -k --keepParent CmdRack.app "CmdRack-${{ steps.version.outputs.version }}.zip"
          ls -lh "CmdRack-${{ steps.version.outputs.version }}.zip"

      - name: Sign zip & generate appcast
        if: steps.check_tag.outputs.exists == 'false'
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          BUILD="${{ steps.version.outputs.build }}"
          TAG="${{ steps.version.outputs.tag }}"
          ZIP_PATH="build/export/CmdRack-${VERSION}.zip"
          DOWNLOAD_URL="https://github.com/${{ github.repository }}/releases/download/${TAG}/CmdRack-${VERSION}.zip"

          # Find sign_update tool from SPM artifacts
          SIGN_UPDATE=$(find ~/Library/Developer/Xcode/DerivedData \
            -name "sign_update" \
            -path "*/Sparkle/*" \
            -type f 2>/dev/null | head -1)

          if [ -z "$SIGN_UPDATE" ]; then
            echo "❌ Could not find sign_update tool"
            exit 1
          fi

          echo "Found sign_update at: $SIGN_UPDATE"
          chmod +x "$SIGN_UPDATE"

          # Sign the zip with EdDSA — pass private key via stdin
          SIGNATURE=$(echo -n "$SPARKLE_PRIVATE_KEY" | "$SIGN_UPDATE" "$ZIP_PATH" --ed-key-file - | grep edSignature | sed 's/.*edSignature="\([^"]*\)".*/\1/')
          LENGTH=$(stat -f%z "$ZIP_PATH")

          echo "EdDSA signature: $SIGNATURE"
          echo "File length: $LENGTH"

          if [ -z "$SIGNATURE" ]; then
            echo "❌ Failed to generate signature"
            exit 1
          fi

          # Build appcast.xml
          cat > build/releases/appcast.xml << APPCAST_EOF
          <?xml version="1.0" encoding="utf-8"?>
          <rss version="2.0" xmlns:sparkle="http://www.andymatuschak.org/xml-namespaces/sparkle" xmlns:dc="http://purl.org/dc/elements/1.1/">
            <channel>
              <title>CmdRack Updates</title>
              <item>
                <title>Version ${VERSION}</title>
                <sparkle:version>${BUILD}</sparkle:version>
                <sparkle:shortVersionString>${VERSION}</sparkle:shortVersionString>
                <pubDate>$(date -R)</pubDate>
                <enclosure
                  url="${DOWNLOAD_URL}"
                  length="${LENGTH}"
                  type="application/octet-stream"
                  sparkle:edSignature="${SIGNATURE}"
                />
              </item>
            </channel>
          </rss>
          APPCAST_EOF

          # Remove leading whitespace from heredoc
          sed -i '' 's/^          //' build/releases/appcast.xml

          echo "✅ appcast.xml generated:"
          cat build/releases/appcast.xml

      - name: Create GitHub Release
        if: steps.check_tag.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: CmdRack ${{ steps.version.outputs.version }}
          body: |
            ## CmdRack ${{ steps.version.outputs.version }}

            ### Installation
            1. Download `CmdRack-${{ steps.version.outputs.version }}.zip` below
            2. Unzip and drag `CmdRack.app` to your Applications folder
            3. Launch CmdRack — it will appear in your menu bar

            *Built from commit ${{ github.sha }}*
          files: |
            build/export/CmdRack-${{ steps.version.outputs.version }}.zip
          draft: false
          prerelease: false

      - name: Commit appcast.xml
        if: steps.check_tag.outputs.exists == 'false'
        run: |
          cp build/releases/appcast.xml appcast.xml
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add appcast.xml
          if git diff --cached --quiet; then
            echo "No changes to appcast.xml"
          else
            git commit -m "Update appcast.xml for v${{ steps.version.outputs.version }}"
            git push
          fi
